
quarkus:
  container-image:
    group: demo
  log:
    console:
      format: "%d{HH:mm:ss} [%-5p][%-16X{traceId}|%-2X{parentId}|%-16X{spanId}|%-5X{sampled}][%-40c{2.}|%-26t] %s%e%n"
  datasource:
    metrics:
      enabled: true
    telemetry:
      enabled: true
    jdbc:
      telemetry: true
#       url: "jdbc:h2:mem:test;MODE=Oracle;DB_CLOSE_DELAY=-1"
  hibernate-orm:
    metrics: true

